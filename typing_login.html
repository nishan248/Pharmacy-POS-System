<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Animation - Login</title>
    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <style>
        body {
            background-color: #282c34;
            color: #abb2bf;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            padding: 40px;
            margin: 0;
            overflow-y: auto;
            line-height: 1.5;
        }
        
        #code-wrapper {
            display: inline-flex;
            align-items: flex-end;
        }

        #code-container {
            font-size: 16px;
            white-space: pre;
            tab-size: 4;
            padding: 0;
            margin: 0;
            background: transparent;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background-color: #528bff;
            vertical-align: bottom;
            animation: blink 1s step-end infinite;
            margin-left: 2px;
            margin-bottom: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="code-wrapper">
        <code id="code-container" class="language-html"></code>
        <span class="cursor"></span>
    </div>

    <script>
        const codeToType = `<!-- Login Screen -->
<div id="login-screen" class="flex h-screen w-screen items-center justify-center bg-slate-100 hidden">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-96 max-w-full">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-full bg-blue-500 text-white flex items-center justify-center text-3xl font-bold shadow-md mx-auto mb-4">
                <i class="fa-solid fa-staff-snake"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Nexus POS</h1>
            <p class="text-sm text-gray-500">Sign in to your account</p>
        </div>
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-gray-400"></i>
                    </div>
                    <input type="text" id="login-username" required class="w-full pl-10 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="login-password" required class="w-full pl-10 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition-colors shadow-md">Sign In</button>
        </form>
    </div>
</div>`;

        const container = document.getElementById('code-container');
        let currentIndex = 0;
        
        // Typing speed controls
        const minSpeed = 5;
        const maxSpeed = 25;

        function typeCode() {
            if (currentIndex < codeToType.length) {
                const currentText = codeToType.substring(0, currentIndex + 1);
                
                container.textContent = currentText;
                
                delete container.dataset.highlighted;
                hljs.highlightElement(container);

                window.scrollTo(0, document.body.scrollHeight);

                currentIndex++;
                
                let delay = Math.random() * (maxSpeed - minSpeed) + minSpeed;
                
                if (codeToType[currentIndex] === '\\n') {
                    delay += 100;
                }

                setTimeout(typeCode, delay);
            }
        }

        setTimeout(typeCode, 1000);
    </script>
</body>
</html>
